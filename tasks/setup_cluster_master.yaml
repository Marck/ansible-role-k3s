---
- name: masters | Setup k3s masters
  block:
    - name: masters | Check if k3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: masters | Download k3s and init cluster
      shell: "curl -sfL https://get.k3s.io | K3S_TOKEN='{{ kubernetes.server_token }}' sh -s - server --cluster-init --write-kubeconfig-mode=0600"
      # no_log: true # token
      register: k3s_cluster_setup_masters_result
      when: not k3s_binary.stat.exists

    - name: masters | Wait for api server to become ready
      pause:
        seconds: 120
      when:
        - k3s_cluster_setup_masters_result is not skipped
        - k3s_cluster_setup_masters_result.changed is true
      
    - name: masters | Get nodes
      shell: kubectl get nodes -o wide
      register: k3s_nodes_status
      changed_when: false

    - name: masters | Debug results
      debug:
        msg: "{{ item.stdout }}"
      loop:
        - "{{ k3s_nodes_status }}"
  become: true