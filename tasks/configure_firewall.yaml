---
- block:
  - name: Changing to iptables-legacy
    alternatives:
      path: /usr/sbin/iptables-legacy
      name: iptables
    register: ip4_legacy
    when: rpi is true

  - name: Changing to ip6tables-legacy
    alternatives:
      path: /usr/sbin/ip6tables-legacy
      name: ip6tables
    register: ip6_legacy
    when: rpi is true

  # Only flush when actually switching backends - otherwise rules added in this
  # run would be wiped and re-added as changed on every subsequent run.
  - name: Flush iptables after switching to iptables-legacy
    iptables:
      flush: true
    changed_when: false
    when: rpi is true and (ip4_legacy.changed or ip6_legacy.changed)

  - name: Configure iptables ports on masters
    iptables:
      chain: INPUT
      protocol: tcp
      destination_port: "{{ port }}"
      jump: ACCEPT
    loop: "{{ kubernetes.firewall.inbound_masters_ports }}"
    loop_control:
      loop_var: port
    register: iptables_master_ports_applied
    when: type == 'master'

  - name: Configure iptables ports on workers
    iptables:
      chain: INPUT
      protocol: tcp
      destination_port: "{{ port }}"
      jump: ACCEPT
    loop: "{{ kubernetes.firewall.inbound_workers_ports }}"
    loop_control:
      loop_var: port
    register: iptables_worker_ports_applied
    when: type == 'worker'

  - name: Stop and disable firewalld on NUC
    systemd:
      name: firewalld
      state: stopped
      enabled: false
    when:
      - type == 'worker'
      - rpi is false
    ignore_errors: true

  # Below steps are needed, because the iptables rules are not persistent and gone at boot
  - name: Save rules to file
    shell: iptables-save > /etc/iptables.conf
    changed_when: false
    when: iptables_master_ports_applied.changed is true or iptables_worker_ports_applied.changed is true

  - name: Edit /etc/rc.local and insert the iptables-restore restore command
    lineinfile:
      path: /etc/rc.local
      regexp: '^iptables-restore'
      insertbefore: '^exit 0'
      line: sudo iptables-restore < /etc/iptables.conf
    when: iptables_master_ports_applied.changed is true or iptables_worker_ports_applied.changed is true
  become: true
