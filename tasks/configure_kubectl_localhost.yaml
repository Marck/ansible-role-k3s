---
# Fetches the cluster-admin kubeconfig to the Ansible controller at ~/.kube/config_home.
# For daily operations use the scoped kubeconfigs generated by configure_rbac.yaml.
- block:
  - name: kubectl-localhost | Enforce admin kubeconfig is only readable by root
    file:
      path: /etc/rancher/k3s/k3s.yaml
      mode: '0600'
      owner: root
      group: root

  - name: kubectl-localhost | Read k3s admin kubeconfig from master
    slurp:
      src: /etc/rancher/k3s/k3s.yaml
    register: k3s_admin_config_raw

  - name: kubectl-localhost | Build kubeconfig with real server IP
    set_fact:
      k3s_admin_config: "{{ (k3s_admin_config_raw.content | b64decode) | replace('https://127.0.0.1:6443', 'https://' + (ansible_host | default(inventory_hostname)) + ':6443') }}"

  - name: kubectl-localhost | Write admin kubeconfig to Ansible controller
    copy:
      content: "{{ k3s_admin_config }}"
      dest: "{{ lookup('env', 'HOME') }}/.kube/config_home"
      mode: '0600'
    delegate_to: localhost
    become: false

  become: true
