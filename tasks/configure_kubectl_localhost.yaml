---
# Configure a new kube config to manage the cluster. See here for more information: https://rancher.com/docs/k3s/latest/en/cluster-access/
# This copies the full cluster-admin kubeconfig. For daily operations use the
# scoped kubeconfigs generated by configure_rbac.yaml (~/.kube/kubeconfig-<user>.yaml).
- block:
  - name: kubectl-localhost | Enforce admin kubeconfig is only readable by root
    file:
      path: /etc/rancher/k3s/k3s.yaml
      mode: '0600'
      owner: root
      group: root
    become: true

  - name: kubectl-localhost | Create tempfile
    tempfile:
      state: file
    register: tempfile

  - name: kubectl-localhost | Copy /etc/rancher/k3s/k3s.yaml from master to temp file
    copy:
      src: /etc/rancher/k3s/k3s.yaml
      dest: "{{ tempfile.path }}"
      remote_src: true
      mode: '0600'
    become: true
    register: k3s_config_copy

  # Using with_items for future expansions
  # Tabs are needed because the config has tabs
  - name: kubectl-localhost | Change config from 127.0.0.1 to master IP in tempfile
    lineinfile:
      path: "{{ tempfile.path }}"
      search_string: "{{ item.search_string }}"
      line: "{{ item.replace_string }}"
    become: true
    with_items:
      - { search_string: '    server: https://127.0.0.1:6443', replace_string: "    server: https://{{ ansible_default_ipv4.address }}:6443" }

  - name: kubectl-localhost | Fetch admin kubeconfig to Ansible controller
    become: true
    fetch:
      src: "{{ tempfile.path }}"
      dest: ~/.kube/config_home
      flat: true
      mode: '0600'

  always:
    - name: kubectl-localhost | Remove tempfile
      become: true
      file:
        path: "{{ tempfile.path }}"
        state: absent
      when: tempfile.path is defined
